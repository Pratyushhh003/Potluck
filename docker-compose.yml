version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: potluck-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  neo4j:
    image: neo4j:5
    container_name: potluck-neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/potluck123
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:7-alpine
    container_name: potluck-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  neo4j-data:
  redis-data:
